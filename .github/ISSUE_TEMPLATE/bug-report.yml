name: Bug Report
description: Report a bug or unexpected behavior in Ycode
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: If applicable, add screenshots or recordings to help explain the problem.

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Self-hosted
        - Ycode Cloud
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 120, Firefox 121, Safari 17

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15, Windows 11, Ubuntu 24.04

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (error messages, console logs, etc.).
